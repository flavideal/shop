<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Flavi Deal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --forest-green: #1B4D2E; --golden-yellow: #f39c12; --light-bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--light-bg); margin: 0; padding: 20px; }
        .cart-wrapper { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h2 { color: var(--forest-green); border-bottom: 2px solid var(--light-bg); padding-bottom: 10px; }
        
        .cart-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #eee; }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
        .item-info { flex: 1; }
        .item-info h4 { margin: 0; font-size: 16px; color: #333; }
        .item-meta { font-size: 12px; color: #888; margin: 5px 0; }
        
        .qty-controls { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .qty-btn { border: 1px solid #ddd; background: white; width: 25px; height: 25px; cursor: pointer; border-radius: 5px; }
        .remove-btn { color: #e74c3c; cursor: pointer; font-size: 13px; margin-top: 10px; display: inline-block; }

        .cart-summary { margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--light-bg); text-align: right; }
        .total-price { font-size: 22px; font-weight: 800; color: var(--forest-green); }
        .checkout-btn { background: var(--forest-green); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; }
        
        .empty-cart { text-align: center; padding: 40px; color: #888; }

        /* Variation Modal Styles */
.modal {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left: 0; top: 0; width: 100%; height: 100%; 
    background-color: rgba(0,0,0,0.5); 
}
.modal-content {
    background-color: white;
    margin: 20% auto;
    padding: 20px;
    border-radius: 15px;
    width: 80%;
    max-width: 400px;
}
.variant-option {
    display: block;
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    font-weight: bold;
}
.variant-option:hover { background: #f0f0f0; border-color: var(--forest-green); }
.variant-option.active { background: var(--forest-green); color: white; }
    </style>
</head>
<body>

<div class="cart-wrapper">
    <a href="javascript:void(0);" onclick="history.back();" style="text-decoration:none; color:var(--forest-green); font-size:14px;">
    <i class="fas fa-arrow-left"></i> Continue Shopping
</a>
    
    <div id="cartItemsList">
        </div>

    <div id="cartSummary" class="cart-summary" style="display:none;">
        <div>Total Amount: <span class="total-price" id="grandTotal">₱0.00</span></div>
        <button class="checkout-btn" onclick="processCheckout()">CHECKOUT NOW</button>
    </div>
</div>

<div id="variationModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--forest-green); margin-top:0;">Select Variation</h3>
        <div id="optionsContainer">
            </div>
        <button onclick="closeModal()" style="margin-top:15px; width:100%; padding:10px; border:none; border-radius:8px; background:#eee; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
// --- KONFIGURASYON ---
const webAppUrl = "https://script.google.com/macros/s/AKfycbwOAaFDHHvMAurq6wc5N8kN6fXmm1a2DyGP3rsLETh9nDt1PnXIyEKZPn1rV_DZWAEY/exec";

// 1. RENDER UI - Updated para sa Variations (Color, Capacity, Size)
function renderCartUI(cart) {
    const container = document.getElementById('cartItemsList');
    const summary = document.getElementById('cartSummary');
    
    if (!cart || cart.length === 0) {
        container.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-basket" style="font-size:40px;"></i><p>Your cart is empty.</p></div>`;
        summary.style.display = "none";
        return;
    }

    summary.style.display = "block";
    let total = 0;
    
    container.innerHTML = cart.map((item, index) => {
    total += item.price * item.quantity;

    let variationLabel = [];
    if (item.color && item.color !== "N/A") variationLabel.push(item.color);
    if (item.capacity && item.capacity !== "N/A") variationLabel.push(item.capacity);
    if (item.size && item.size !== "N/A") variationLabel.push(`Size: ${item.size}`);

    // Link papunta sa product page gamit ang ID
    const productLink = `product.html?id=${item.id}`;

    return `
        <div class="cart-item">
            <a href="${productLink}">
                <img src="${item.image}" alt="${item.name}" style="cursor:pointer;">
            </a>
            
            <div class="item-info">
                <a href="${productLink}" style="text-decoration:none; color:inherit;">
                    <h4 style="cursor:pointer; margin:0;">${item.name}</h4>
                </a>

                <div class="item-meta">
                    ${variationLabel.join(' | ')} 
                    <span onclick="editVariation(${index})" style="margin-left:10px; color:var(--forest-green); cursor:pointer; font-weight:bold; text-decoration:underline;">
                        Change
                    </span>
                </div>

                <div style="font-weight:bold; color:var(--forest-green);">₱${item.price.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                
                <div class="qty-controls">
                    <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                    <span style="font-weight:bold; width: 30px; text-align: center; display: inline-block;">${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                </div>
                <span class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash"></i> Remove</span>
            </div>
        </div>
    `;
}).join('');

    document.getElementById('grandTotal').innerText = `₱${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
}

// 2. LOAD CART - Kinukuha ang data sa LocalStorage + Cloud Sync
async function loadCart() {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const user = JSON.parse(localStorage.getItem('currentUser'));

    if (user && user.email) {
        try {
            // Kunin ang cart mula sa Google Sheets
            const response = await fetch(`${webAppUrl}?action=getCart&email=${encodeURIComponent(user.email)}`);
            const serverCart = await response.json();
            
            if (serverCart && serverCart.length > 0) {
                // I-merge: idagdag ang wala sa local mula sa server
                serverCart.forEach(sItem => {
                    const exists = cart.find(lItem => lItem.id === sItem.id && lItem.color === sItem.color && lItem.capacity === sItem.capacity) && lItem.size === sItem.size;
                    if (!exists) cart.push(sItem);
                });
                localStorage.setItem('cart', JSON.stringify(cart));
            }
        } catch (e) {
            console.log("Using offline cart data.");
        }
    }
    renderCartUI(cart);
}

// 3. SYNC TO CLOUD - Sine-save ang cart sa Google Sheets
async function syncCartToCloud() {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    const cart = localStorage.getItem('cart');
    
    if (user && user.email && cart) {
        try {
            await fetch(`${webAppUrl}?action=syncCart&email=${encodeURIComponent(user.email)}&cartData=${encodeURIComponent(cart)}`);
            console.log("Cloud synced.");
        } catch (err) {
            console.error("Sync error:", err);
        }
    }
}

// 4. UPDATE QUANTITY
async function updateQty(index, change) {
    let cart = JSON.parse(localStorage.getItem('cart'));
    cart[index].quantity += change;
    
    if (cart[index].quantity < 1) cart[index].quantity = 1;
    
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCartUI(cart);
    await syncCartToCloud(); // I-save sa cloud pagkatapos palitan
}

// 5. REMOVE ITEM
async function removeItem(index) {
    if(!confirm("Remove this item?")) return;
    let cart = JSON.parse(localStorage.getItem('cart'));
    cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCartUI(cart);
    await syncCartToCloud(); // I-save sa cloud pagkatapos burahin
}

// 6. CHECKOUT
function processCheckout() {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (!user) {
        alert("Please login first to proceed.");
        window.location.href = 'account.html'; 
    } else {
        alert("Thank you! Processing your order...");
        // Dito mo ilalagay ang sunod na step para sa payment/order form
    }
}

let currentEditingIndex = -1;

function editVariation(index) {
    currentEditingIndex = index;
    const cart = JSON.parse(localStorage.getItem('cart'));
    const item = cart[index];
    const container = document.getElementById('optionsContainer');
    
    // TANDAAN: Dapat ay may access ka sa product list mo para malaman ang options.
    // Dito, i-assume natin na ang item ay may "availableOptions" property 
    // o kaya ay kukunin natin sa global product list.
    
    // Halimbawa ng dummy data kung wala pang listahan:
    const sampleColors = ["Black", "White", "Sierra Blue", "Graphite"]; 
    
    container.innerHTML = `<p style="font-size:12px; color:#888;">Choose a new Color:</p>`;
    
    sampleColors.forEach(color => {
        const isActive = item.color === color ? 'active' : '';
        container.innerHTML += `
            <button class="variant-option ${isActive}" onclick="updateItemVariation('${color}')">
                ${color}
            </button>
        `;
    });

    document.getElementById('variationModal').style.display = "block";
}

let currentEditingIndex = -1;

async function editVariation(index) {
    currentEditingIndex = index;
    const cart = JSON.parse(localStorage.getItem('cart'));
    const item = cart[index];
    const container = document.getElementById('optionsContainer');
    
    container.innerHTML = `<div style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-spin"></i> Loading options...</div>`;
    document.getElementById('variationModal').style.display = "block";
    document.getElementById('modalTitle').innerText = `Change ${item.name}`;

    try {
        // 1. I-fetch ang latest product details mula sa Google Sheets API mo
        // Ginagamit ang ID para makuha ang specific variations ng product na ito
        const response = await fetch(`${webAppUrl}?action=getProductVariants&id=${item.id}`);
        const productDetails = await response.json(); 

        // 2. I-clear ang loading
        container.innerHTML = "";

        // 3. I-render ang Color Options (kung available sa Sheets)
        if (productDetails.colors && productDetails.colors.length > 0) {
            container.innerHTML += `<p style="font-size:11px; font-weight:bold; color:#888; margin-bottom:5px;">AVAILABLE COLORS:</p>`;
            productDetails.colors.forEach(c => {
                const active = item.color === c ? 'active' : '';
                container.innerHTML += `
                    <button class="variant-option ${active}" onclick="updateItemField('color', '${c}')">
                        ${c}
                    </button>
                `;
            });
        }

        // 4. I-render ang Capacity/Size Options (kung available sa Sheets)
        if (productDetails.capacities && productDetails.capacities.length > 0) {
            container.innerHTML += `<p style="font-size:11px; font-weight:bold; color:#888; margin-top:15px; margin-bottom:5px;">AVAILABLE CAPACITY:</p>`;
            productDetails.capacities.forEach(cap => {
                const active = item.capacity === cap ? 'active' : '';
                container.innerHTML += `
                    <button class="variant-option ${active}" onclick="updateItemField('capacity', '${cap}')">
                        ${cap}
                    </button>
                `;
            });
        }

    } catch (err) {
        container.innerHTML = `<p style="color:red; font-size:12px;">Failed to load options. Please try again.</p>`;
    }
}

// Function para i-update ang specific field (color man o capacity)
async function updateItemField(field, newVal) {
    let cart = JSON.parse(localStorage.getItem('cart'));
    
    // Update the specific field
    cart[currentEditingIndex][field] = newVal;

    // Optional: Kung may special price ang bagong variant, 
    // pwede mo ring i-update ang cart[currentEditingIndex].price dito.

    localStorage.setItem('cart', JSON.stringify(cart));
    renderCartUI(cart);
    closeModal(); // Isara agad pagkapili
    await syncCartToCloud();
}
</script>
</body>
</html>
