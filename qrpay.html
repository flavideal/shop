<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Portal | Flavi Deal</title>
    <style>
        :root { --primary: #0056b3; --success: #28a745; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 15px; }
        .card { max-width: 450px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .lang-bar { background: #eee; padding: 10px; display: flex; justify-content: center; gap: 10px; }
        .lang-btn { border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 0.8em; }
        .active { background: var(--primary); color: white; }
        .content { padding: 20px; }
        .details { background: #fdfdfd; border: 1px solid #eee; padding: 10px; border-radius: 8px; font-size: 0.85em; margin-bottom: 15px; }
        .qr-img { width: 100%; max-width: 200px; display: block; margin: 10px auto; border: 1px solid #ddd; }
        .upload-section { border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px; }
        input[type="file"] { width: 100%; margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-upload { background: var(--success); color: white; }
        .btn-upload:disabled { background: #ccc; }
        [lang="tl"] { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-bar">
        <button id="en-btn" class="lang-btn active" onclick="switchLang('en')">English</button>
        <button id="tl-btn" class="lang-btn" onclick="switchLang('tl')">Tagalog</button>
    </div>

    <div class="content">
        <h3 id="h-en">Payment Instructions</h3>
        <h3 id="h-tl" lang="tl">Gabay sa Pagbabayad</h3>

        <div class="details">
            <b>Merchant:</b> Flavi Deal<br>
            <b>Location:</b> Butuan City<br>
            <b>Type:</b> QRPh / GCash / Maya
        </div>

        <img src="YOUR_QR_CODE.png" class="qr-img" alt="QR Code">

        <div class="lang-group-en">
            <p>1. Scan the QR code.<br>2. Complete the payment.<br>3. Upload the receipt below.</p>
        </div>
        <div class="lang-group-tl" lang="tl">
            <p>1. I-scan ang QR code.<br>2. Bayaran ang tamang halaga.<br>3. I-upload ang resibo sa ibaba.</p>
        </div>

        <div class="upload-section">
            <input type="file" id="fileInput" accept="image/*">
            <button id="uploadBtn" class="btn btn-upload" onclick="startUpload()">
                <span class="lang-group-en">UPLOAD RECEIPT</span>
                <span class="lang-group-tl" lang="tl">I-UPLOAD ANG RESIBO</span>
            </button>
            <p id="msg" style="text-align:center; font-size: 0.8em; margin-top:10px;"></p>
        </div>
    </div>
</div>

<script>
    function switchLang(l) {
        document.querySelectorAll('[lang="tl"]').forEach(el => el.style.display = (l === 'tl' ? 'block' : 'none'));
        document.querySelectorAll('.lang-group-en, #h-en').forEach(el => el.style.display = (l === 'en' ? 'block' : 'none'));
        document.getElementById('en-btn').classList.toggle('active', l === 'en');
        document.getElementById('tl-btn').classList.toggle('active', l === 'tl');
    }

    function startUpload() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file) return alert("Select file first!");

        const btn = document.getElementById('uploadBtn');
        const msg = document.getElementById('msg');
        btn.disabled = true;
        msg.innerText = "Processing upload...";

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result.split(',')[1];
            const payload = {
                base64: base64,
                type: file.type,
                name: "PAYMENT_" + Date.now() + "_" + file.name
            };

            fetch('https://script.google.com/macros/s/AKfycby_h42AKGlKrJqqyGEoOftkui9FpkOm6VoE6SuFGXYMC3shhiT4C1G1v-9qB9lxc1Kp/exec', {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.result === "success") {
                    msg.style.color = "green";
                    msg.innerText = "Upload Successful! Thank you.";
                } else { throw new Error(); }
            })
            .catch(() => {
                msg.style.color = "red";
                msg.innerText = "Error. Please try again.";
                btn.disabled = false;
            });
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
