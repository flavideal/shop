<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Portal | Gracey Kainan</title>
    <style>
        :root { --primary-color: #d32f2f; --success-color: #2e7d32; --bg-color: #fff8f8; }
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .payment-card { max-width: 500px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #ffcdd2; }
        
        .lang-switch { display: flex; justify-content: flex-end; padding: 10px; background: #f1f1f1; gap: 8px; }
        .lang-btn { cursor: pointer; border: 1px solid #ccc; padding: 4px 10px; border-radius: 15px; background: white; font-size: 0.75em; font-weight: bold; }
        .lang-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--primary-color); }
        .header h2 { margin: 0; color: var(--primary-color); }

        /* Calculator Area */
        .payment-box { padding: 20px; background: #fff5f5; margin: 15px; border-radius: 10px; border: 1px dashed #d32f2f; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1.1em; }
        
        .result-box { background: white; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.95em; }
        .total-row { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 2px solid #eee; font-weight: bold; color: var(--primary-color); font-size: 1.2em; }

        .qr-area { text-align: center; padding: 10px; }
        .qr-code { width: 180px; height: 180px; border: 2px solid #eee; border-radius: 10px; }

        .file-input-container { padding: 0 20px; margin-top: 10px; }
        .btn-upload { display: block; width: calc(100% - 40px); margin: 10px 20px 20px 20px; padding: 15px; background: var(--success-color); color: white; text-align: center; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; }
        .btn-upload:disabled { background: #ccc; }
        
        #status-msg { text-align: center; font-size: 0.85em; margin-bottom: 10px; font-weight: bold; }
        .footer { text-align: center; padding: 15px; font-size: 0.75em; color: #999; border-top: 1px solid #eee; }
        [lang="tl"] { display: none; }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('tl')">TL</button>
    </div>

    <div class="header">
        <h2 id="title-en">GRACEY KAINAN</h2>
        <h2 id="title-tl" lang="tl">GRACEY KAINAN</h2>
        <p style="margin:5px 0; font-size:0.85em;">Official Payment Portal</p>
    </div>

    <div class="payment-box">
        <div class="input-group">
            <label id="lbl-en">Enter Order Amount:</label>
            <label id="lbl-tl" lang="tl">Ilagay ang Halaga ng Order:</label>
            <input type="number" id="orderAmount" placeholder="0.00" oninput="calculateTotal()">
        </div>
        
        <div class="result-box">
            <div class="result-row">
                <span>Transfer Fee (1%):</span>
                <span id="feeAmount">₱0.00</span>
            </div>
            <div class="total-row">
                <span id="tot-en">TOTAL TO PAY:</span>
                <span id="tot-tl" lang="tl">KABUUANG BAYAD:</span>
                <span id="finalTotal">₱0.00</span>
            </div>
        </div>
    </div>

    <div class="qr-area">
        <img src="YOUR_GRACEY_QR.png" alt="QR Code" class="qr-code">
        <p id="scan-en" style="font-size:0.85em;">Scan to pay the Total Amount</p>
        <p id="scan-tl" lang="tl" style="font-size:0.85em;">I-scan para bayaran ang Total</p>
    </div>

    <div class="file-input-container">
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="status-msg"></div>

    <button id="uploadBtn" class="btn-upload" onclick="uploadToDrive()">
        <span id="btn-en">SUBMIT PROOF OF PAYMENT</span>
        <span id="btn-tl" lang="tl">I-SUBMIT ANG PROOF</span>
    </button>

    <div class="footer">
        Gracey Kainan &copy; 2026 | Butuan City
    </div>
</div>

<script>
    function calculateTotal() {
        const orderAmount = parseFloat(document.getElementById('orderAmount').value) || 0;
        
        // Logic: 1% Fee
        let fee = orderAmount * 0.01;
        
        // Logic: If there is a decimal (e.g., 1.30), round UP to nearest whole number (e.g., 2)
        let roundedFee = Math.ceil(fee);
        
        let total = orderAmount + roundedFee;

        document.getElementById('feeAmount').innerText = "₱" + roundedFee.toFixed(2);
        document.getElementById('finalTotal').innerText = "₱" + total.toFixed(2);
    }

    function setLanguage(lang) {
        const isTl = lang === 'tl';
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', (b.innerText === (isTl ? 'TL' : 'EN'))));
        
        // Toggle elements with lang="tl"
        document.querySelectorAll('[lang="tl"]').forEach(el => el.style.display = isTl ? 'block' : 'none');
        
        // Toggle English elements
        document.getElementById('title-en').style.display = isTl ? 'none' : 'block';
        document.getElementById('lbl-en').style.display = isTl ? 'none' : 'block';
        document.getElementById('tot-en').style.display = isTl ? 'none' : 'inline';
        document.getElementById('scan-en').style.display = isTl ? 'none' : 'block';
        document.getElementById('btn-en').style.display = isTl ? 'none' : 'block';
    }

    function uploadToDrive() {
        const fileInput = document.getElementById('fileInput');
        const statusMsg = document.getElementById('status-msg');
        const btn = document.getElementById('uploadBtn');
        const amount = document.getElementById('finalTotal').innerText;

        if (fileInput.files.length === 0) {
            alert("Please select your receipt first.");
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();
        statusMsg.innerText = "Uploading...";
        btn.disabled = true;

        reader.onload = function(e) {
            const base64 = e.target.result.split(',')[1];
            const payload = {
                base64: base64,
                type: file.type,
                name: "GRACEY_" + amount + "_" + new Date().getTime() + "_" + file.name
            };

            fetch('IYONG_WEB_APP_URL_DITO', {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.result === "success") {
                    alert("Thank you for your payment to Gracey Kainan! Your proof has been saved. Come again!");
                    location.reload(); 
                } else { throw new Error(); }
            })
            .catch(() => {
                alert("Upload failed. Please try again.");
                btn.disabled = false;
            });
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
