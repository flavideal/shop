<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavi Deal | Premium Gadgets & Installments</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="#" class="logo">FLAVI DEAL</a>
        <div class="nav-links">
            <span>Shop | Offers | New Arrival</span>
        </div>
        <div class="nav-icons">
            <i class="fas fa-search"></i>
            <i class="fas fa-shopping-cart"></i>
            <i class="fas fa-user-circle" onclick="location.href='account.html'"></i>
        </div>
    </nav>

    <section class="hero">
    <h1>Our Shop is in the Works!</h1>
    <p>We are launching soon to bring you the best deals. 🚀<br>
    Follow us on <b>Facebook</b> for the latest updates and big reveals!</p>
    <button class="cta-btn" onclick="window.open('https://www.facebook.com/flavidealinstallment', '_blank')">
        Follow our Facebook Page
    </button>
</section>

    <section class="product-container" id="product-list">
    </section>

    <div class="mobile-nav">
        <div class="item"><i class="fas fa-home"></i><br>Home</div>
        <div class="item"><i class="fas fa-th-large"></i><br>Shop</div>
        <div class="item"><i class="fas fa-percent"></i><br>Offers</div>
        <div class="item" onclick="location.href='account.html'"><i class="fas fa-user"></i><br>Account</div>
    </div>

    <div id="productViewModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('productViewModal').style.display='none'">&times;</span>
            
            <div class="gallery-wrapper">
                <div id="photoGallery" class="gallery-container"></div>
                <div id="image-counter">1 / 14</div>
            </div>
            
           <div class="details-body">
    <h2 id="viewName" style="color: #1B4D2E; margin-bottom: 10px;"></h2>
    
    <div id="viewPrice" style="margin-bottom: 15px; padding: 12px; background: #f8fcf9; border-radius: 10px; border: 1px solid #edf5ef;">
        </div>

    <p id="viewDesc" style="font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 15px;"></p>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

    <div id="viewColors" style="margin-bottom: 15px;"></div>

    <div id="viewCapacity" style="margin-bottom: 15px;"></div>

    <div class="action-buttons">
    <button id="addToCartBtn">Add to Cart</button>
    <button id="buyNowBtn">Buy Now</button>
</div>
</div>
        </div>
    </div>

    <div id="fullscreenView" class="fullscreen-view">
    <span class="close-fs" onclick="closeFullImage()">&times;</span>
    <div id="fullscreenGallery"></div>
    <div id="fs-counter"></div>
</div>

    <script src="script.js"></script>
</body>
</html>
